workflows:
    ios-workflow:
        name: Capacitor iOS Workflow
        max_build_duration: 60
        instance_type: mac_mini_m2
        environment:
            node: 20
            xcode: latest
            cocoapods: default

        triggering:
            events:
                - push
            branch_patterns:
                - pattern: main
                  include: true
                  source: true

        scripts:
            - name: Install npm dependencies
              script: npm install

            - name: Build www folder
              script: |
                mkdir -p www/book/sections
                mkdir -p www/book/images
                mkdir -p www/book/styles
                cp index.html www/index.html
                cp book.html www/book.html
                cp cover.xhtml www/book/sections/
                cp section0001.xhtml www/book/sections/
                cp section0002.xhtml www/book/sections/
                cp section0003.xhtml www/book/sections/
                cp section0004.xhtml www/book/sections/
                cp section0005.xhtml www/book/sections/
                cp section0006.xhtml www/book/sections/
                cp cover.png www/book/images/
                cp stylesheet.css www/book/styles/

            - name: Add and sync Capacitor iOS
              script: |
                if [ ! -d "ios" ]; then npx cap add ios; fi
                npx cap sync ios

            - name: Install CocoaPods
              script: |
                cd ios/App
                pod install

            - name: Build IPA
              script: |
                xcode-project use-profiles
                xcode-project build-ipa \
                  --workspace ios/App/App.xcworkspace \
                  --config Release

        artifacts:
            - build/ios/ipa/*.ipa

        publishing:
            email:
                recipients:
                    - mmbernau@gmail.com
                notify:
                    success: true
                    failure: true

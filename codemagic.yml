workflows:

  # ─────────────────────────────────────────────
  # ANDROID
  # ─────────────────────────────────────────────
  android-workflow:
    name: Capacitor Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Build web assets
        script: |
          mkdir -p www/book/sections
          mkdir -p www/book/images
          mkdir -p www/book/styles
          cp www/index.html www/index.html 2>/dev/null || true
          cp www/book.html www/book.html 2>/dev/null || true
          echo "www/ structure ready"
          find www -type f | sort

      - name: Add & sync Capacitor Android
        script: |
          if [ ! -d "android" ]; then npx cap add android; fi
          npx cap sync android

      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"

      - name: Build Android (debug APK)
        script: |
          cd android
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - mmbernau@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────
  # iOS
  # ─────────────────────────────────────────────
  ios-workflow:
    name: Capacitor iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.yourcompany.kaimcalculator
      groups:
        - appstore_credentials
      vars:
        APP_STORE_CONNECT_ISSUER_ID: Encrypted(...)
        APP_STORE_CONNECT_KEY_IDENTIFIER: Encrypted(...)
        APP_STORE_CONNECT_PRIVATE_KEY: Encrypted(...)

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Add & sync Capacitor iOS
        script: |
          if [ ! -d "ios" ]; then npx cap add ios; fi
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build & export IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - mmbernau@gmail.com
        notify:
          success: true
          failure: true
